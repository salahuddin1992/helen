[pytest]
# Phase 4 / Module V — alternate pytest config (run via `pytest -c pytest.phase4.ini`).
# Leaves the existing pytest.ini untouched.

asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    slow: long-running scenario tests (>5 s each)
    integration: requires multiple subsystems live (db + sio)
    phase4: introduced in Phase 4 hardening pack
    network: requires real LAN / external HTTP
    windows: only meaningful on Windows
    skip_ci: never collected in CI

filterwarnings =
    ignore::DeprecationWarning:passlib.*
    ignore::DeprecationWarning:websockets.*
    ignore::PendingDeprecationWarning

# Coverage knobs (enabled when --cov flag is passed)
addopts = -ra --strict-markers
