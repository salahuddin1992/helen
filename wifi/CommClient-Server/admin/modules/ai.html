<!DOCTYPE html>
<!--
  Phase 5 / Module Z — AI Assistant admin module.
  Self-contained. Loaded by the admin SPA shell via `loadModule('ai')`.
  Requires the global `apiFetch(path, opts)` helper.
-->
<style>
  :root {
    --ai-fg:#e4e7eb; --ai-bg:#0e141b; --ai-bg2:#171f27;
    --ai-border:#222e3a; --ai-accent:#a78bfa;
    --ai-danger:#ff5f6d; --ai-warn:#ffb347; --ai-ok:#46d39a;
  }
  .ai-wrap { color:var(--ai-fg); font-family:system-ui,sans-serif; padding:18px; }
  .ai-cards { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:18px; }
  .ai-card { background:var(--ai-bg2); border:1px solid var(--ai-border);
             padding:14px; border-radius:12px; }
  .ai-card .label { font-size:12px; opacity:.7; }
  .ai-card .val   { font-size:22px; font-weight:600; margin-top:6px; }
  .ai-section { background:var(--ai-bg2); border:1px solid var(--ai-border);
                border-radius:12px; padding:18px; margin-bottom:18px; }
  .ai-h { margin:0 0 12px 0; font-size:16px; }
  .ai-input, .ai-select, .ai-textarea {
    width:100%; background:#0a1018; color:var(--ai-fg);
    border:1px solid var(--ai-border); border-radius:8px; padding:8px 10px;
    box-sizing:border-box; margin-top:4px;
  }
  .ai-btn { background:var(--ai-accent); color:#0a1018; border:none;
            padding:8px 14px; border-radius:8px; cursor:pointer; font-weight:600; }
  .ai-btn.secondary { background:#2a3340; color:var(--ai-fg); }
  .ai-grid2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .ai-tbl { width:100%; border-collapse:collapse; font-size:13px; }
  .ai-tbl th, .ai-tbl td { padding:6px 8px; border-bottom:1px solid var(--ai-border);
                           text-align:left; }
  .ai-pill { display:inline-block; padding:2px 8px; border-radius:99px;
             font-size:11px; background:#2a3340; }
  .ai-pill.ok { background:#22432e; color:var(--ai-ok); }
  .ai-pill.bad { background:#4a2326; color:var(--ai-danger); }
  pre.ai-out { background:#0a1018; padding:10px; border-radius:8px; overflow:auto; }
  canvas#ai-chart { width:100%; height:180px; background:#0a1018; border-radius:8px; }
</style>

<div class="ai-wrap">
  <div class="ai-section">
    <h3 class="ai-h">Workspace</h3>
    <input class="ai-input" id="ai-ws" placeholder="workspace_id" />
    <div style="margin-top:10px;">
      <button class="ai-btn" id="ai-load">Load</button>
    </div>
  </div>

  <div class="ai-cards" id="ai-cards"></div>

  <div class="ai-section">
    <h3 class="ai-h">Provider Configuration</h3>
    <div class="ai-grid2">
      <div>
        <label>Provider</label>
        <select class="ai-select" id="ai-provider">
          <option value="none">disabled</option>
          <option value="anthropic">Anthropic</option>
          <option value="openai">OpenAI</option>
          <option value="ollama">Ollama (local)</option>
        </select>
      </div>
      <div>
        <label>Model</label>
        <input class="ai-input" id="ai-model"
               placeholder="claude-3-5-sonnet-latest"/>
      </div>
      <div>
        <label>API Key (write-only — never displayed)</label>
        <input class="ai-input" id="ai-key" type="password"
               placeholder="leave blank to keep existing"/>
      </div>
      <div>
        <label>Base URL (optional)</label>
        <input class="ai-input" id="ai-base"
               placeholder="e.g. http://localhost:11434"/>
      </div>
    </div>
    <div style="margin-top:14px; display:flex; gap:8px;">
      <button class="ai-btn" id="ai-save">Save</button>
      <button class="ai-btn secondary" id="ai-toggle">Toggle enabled</button>
    </div>
  </div>

  <div class="ai-section">
    <h3 class="ai-h">Usage (last 7 days)</h3>
    <canvas id="ai-chart"></canvas>
    <table class="ai-tbl" id="ai-usage-tbl"></table>
  </div>

  <div class="ai-grid2">
    <div class="ai-section">
      <h3 class="ai-h">Opt-In Matrix</h3>
      <table class="ai-tbl" id="ai-optin-tbl"></table>
    </div>

    <div class="ai-section">
      <h3 class="ai-h">Test Prompt</h3>
      <textarea class="ai-textarea" id="ai-test-input" rows="4"
                placeholder="Hello, ping?"></textarea>
      <div style="margin-top:8px;">
        <button class="ai-btn" id="ai-test-run">Run</button>
      </div>
      <pre class="ai-out" id="ai-test-out"></pre>
    </div>
  </div>
</div>

<script>
(function(){
  let cfg = null;
  let ws = null;

  async function api(path, opts){
    return (await apiFetch('/api/admin/ai' + path, opts || {})).json();
  }

  function setCards(d){
    const c = document.getElementById('ai-cards');
    c.innerHTML = `
      <div class="ai-card"><div class="label">Provider</div><div class="val">${d.provider}</div></div>
      <div class="ai-card"><div class="label">Model</div><div class="val">${d.model_name || '-'}</div></div>
      <div class="ai-card"><div class="label">Enabled</div><div class="val">${d.enabled?'<span class="ai-pill ok">YES</span>':'<span class="ai-pill bad">NO</span>'}</div></div>
      <div class="ai-card"><div class="label">Key Stored</div><div class="val">${d.api_key_secret_ref?'<span class="ai-pill ok">yes</span>':'<span class="ai-pill bad">no</span>'}</div></div>
    `;
  }
  function fillForm(d){
    document.getElementById('ai-provider').value = d.provider;
    document.getElementById('ai-model').value = d.model_name || '';
    document.getElementById('ai-key').value = '';
    document.getElementById('ai-base').value = d.base_url || '';
  }

  async function loadAll(){
    ws = document.getElementById('ai-ws').value.trim();
    if(!ws) return;
    try {
      cfg = await api(`/config?workspace_id=${encodeURIComponent(ws)}`, {});
    } catch(e) {
      cfg = { provider:'none', model_name:'', enabled:false, settings:{} };
    }
    setCards(cfg); fillForm(cfg);
    await loadUsage(); await loadOptIns();
  }

  async function loadUsage(){
    const u = await api(`/usage?workspace_id=${encodeURIComponent(ws)}&days=7`, {});
    const rows = u.series || [];
    const tbl = document.getElementById('ai-usage-tbl');
    tbl.innerHTML = '<tr><th>Date</th><th>Calls</th><th>Tokens</th><th>Cost (µUSD)</th></tr>' +
      rows.map(r => `<tr><td>${r.date}</td><td>${r.calls}</td><td>${r.tokens.toLocaleString()}</td><td>${r.cost_micro_usd}</td></tr>`).join('');
    drawChart(rows);
  }

  function drawChart(rows){
    const cvs = document.getElementById('ai-chart');
    const ctx = cvs.getContext('2d');
    const W = cvs.width = cvs.offsetWidth;
    const H = cvs.height = 180;
    ctx.clearRect(0,0,W,H);
    if(!rows.length) return;
    const max = Math.max(...rows.map(r => r.tokens), 1);
    const bw = W / rows.length;
    ctx.fillStyle = '#a78bfa';
    rows.forEach((r,i) => {
      const h = (r.tokens / max) * (H - 24);
      ctx.fillRect(i*bw + 4, H - h - 4, bw - 8, h);
    });
    ctx.fillStyle = '#e4e7eb';
    ctx.font = '10px system-ui';
    rows.forEach((r,i) => ctx.fillText(r.date.slice(5), i*bw + 4, H - 2));
  }

  async function loadOptIns(){
    const arr = await api(`/opt-ins?workspace_id=${encodeURIComponent(ws)}`, {});
    const tbl = document.getElementById('ai-optin-tbl');
    tbl.innerHTML = '<tr><th>User</th><th>Scope</th><th>Opted</th><th>Revoked</th></tr>' +
      arr.map(r => `<tr><td>${r.user_id}</td><td>${r.scope}</td><td>${r.opted_at}</td><td>${r.revoked_at||''}</td></tr>`).join('');
  }

  document.getElementById('ai-load').onclick = loadAll;
  document.getElementById('ai-save').onclick = async () => {
    if(!ws) return alert('select a workspace');
    const body = {
      workspace_id: ws,
      provider: document.getElementById('ai-provider').value,
      model_name: document.getElementById('ai-model').value,
      api_key_value: document.getElementById('ai-key').value || null,
      base_url: document.getElementById('ai-base').value || null,
      enabled: true, settings: {},
    };
    const res = await (await apiFetch('/api/admin/ai/config', {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(body),
    })).json();
    cfg = res; setCards(res);
    alert('saved');
  };
  document.getElementById('ai-toggle').onclick = async () => {
    if(!cfg) return;
    const body = { ...cfg, workspace_id: ws, enabled: !cfg.enabled };
    delete body.id;
    const res = await (await apiFetch('/api/admin/ai/config', {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(body),
    })).json();
    cfg = res; setCards(res);
  };
  document.getElementById('ai-test-run').onclick = async () => {
    if(!ws) return alert('select a workspace');
    const prompt = document.getElementById('ai-test-input').value;
    const url = `/api/admin/ai/test?workspace_id=${encodeURIComponent(ws)}&prompt=${encodeURIComponent(prompt)}`;
    try {
      const res = await (await apiFetch(url, {method:'POST'})).json();
      document.getElementById('ai-test-out').textContent =
        `tokens: ${res.tokens}  latency_ms: ${res.latency_ms}\n\n${res.text}`;
    } catch(e) {
      document.getElementById('ai-test-out').textContent = 'ERR: ' + e;
    }
  };
})();
</script>

</script>
</body>
</html>
