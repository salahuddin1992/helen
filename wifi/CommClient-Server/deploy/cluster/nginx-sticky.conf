# =====================================================================
# Helen-Server — nginx reverse proxy with sticky sessions + WebSocket
# =====================================================================
#
#   * ip_hash gives stable affinity per source IP (cheap, no extra modules).
#   * For workspace-aware stickiness use a cookie-based upstream (commented
#     below) — requires the nginx-sticky-cookie module.
#   * WebSocket / socket.io transports require Upgrade / Connection headers.
#
# Bring this in via:    include /etc/nginx/conf.d/helen-sticky.conf;
# ---------------------------------------------------------------------

upstream helen_cluster {
    # Sticky by client IP (consistent hashing variant: use hash $remote_addr consistent;)
    ip_hash;

    # Generated dynamically by /api/admin/cluster/nginx-upstream.
    # Replace these placeholders with your real node hostnames/ports.
    server helen1:3000 max_fails=3 fail_timeout=15s;
    server helen2:3000 max_fails=3 fail_timeout=15s;
    server helen3:3000 max_fails=3 fail_timeout=15s;

    # Optional: keepalive connections to upstream (perf).
    keepalive 64;
}

# WebSocket upgrade map
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Real-IP from the front-most proxy (Cloudflare / ELB / etc.)
set_real_ip_from 10.0.0.0/8;
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;
real_ip_header   X-Forwarded-For;
real_ip_recursive on;

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name  helen.example.com;

    ssl_certificate     /etc/ssl/helen/fullchain.pem;
    ssl_certificate_key /etc/ssl/helen/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 0;             # let upload-rate limits handle size
    proxy_read_timeout   3600s;
    proxy_send_timeout   3600s;
    proxy_buffering      off;
    proxy_request_buffering off;

    # ---- socket.io / WebSocket transports ----
    location /socket.io/ {
        proxy_pass http://helen_cluster;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }

    # ---- HTTP API ----
    location / {
        proxy_pass http://helen_cluster;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Cluster-Sticky  $remote_addr;
    }

    # ---- health probe path (no auth) ----
    location = /healthz {
        access_log off;
        proxy_pass http://helen_cluster/api/health;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name helen.example.com;
    return 301 https://$host$request_uri;
}
