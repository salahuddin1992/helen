# =====================================================================
# Helen-Server — HAProxy alternative to nginx, with consistent-hash
# stickiness + WebSocket passthrough.
# =====================================================================

global
    log         stdout format raw local0
    daemon
    maxconn     16384
    tune.ssl.default-dh-param 2048

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  http-server-close
    option  forwardfor       except 127.0.0.0/8
    timeout connect 5s
    timeout client  3600s
    timeout server  3600s
    timeout tunnel  3600s
    timeout http-request 30s

frontend helen_https
    bind *:443 ssl crt /etc/ssl/helen/helen.pem alpn h2,http/1.1
    bind *:80
    redirect scheme https code 301 if !{ ssl_fc }

    # ACL: socket.io / WebSocket upgrades
    acl is_websocket hdr(Upgrade) -i websocket
    acl is_socketio  path_beg /socket.io/

    default_backend helen_cluster
    use_backend     helen_cluster if is_socketio or is_websocket

backend helen_cluster
    balance source
    hash-type consistent murmur3

    option httpchk
    http-check send meth GET uri /api/health

    # Generated dynamically by /api/admin/cluster/haproxy-backend.
    server helen1 helen1:3000 check inter 5s fall 3 rise 2 maxconn 4096
    server helen2 helen2:3000 check inter 5s fall 3 rise 2 maxconn 4096
    server helen3 helen3:3000 check inter 5s fall 3 rise 2 maxconn 4096

    # Stick by JWT-derived user_id when the client sends it as a header.
    stick-table type string len 32 size 50k expire 30m
    stick on req.hdr(X-User-Id) if { hdr(X-User-Id) -m found }

listen stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 5s
    stats admin if TRUE
