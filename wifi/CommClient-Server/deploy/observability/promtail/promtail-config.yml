server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: helen-files
    static_configs:
      - targets: [localhost]
        labels:
          job: helen-server
          service: helen-server
          env: prod
          __path__: /var/log/helen/*.log

  - job_name: helen-docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: ["helen1","helen2","helen3"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container_name
      - source_labels: ['container_name']
        target_label: node
