global:
  resolve_timeout: 5m
  smtp_from: "alerts@helen.example.com"
  smtp_smarthost: "smtp.example.com:587"
  smtp_auth_username: ""
  smtp_auth_password: ""
  smtp_require_tls: true

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'pager'
      continue: true
    - match:
        severity: warning
      receiver: 'chat'

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://helen1:3000/api/admin/observability/alerts/ingest'
        send_resolved: true

  - name: 'pager'
    webhook_configs:
      - url: 'http://helen1:3000/api/admin/observability/alerts/ingest'
        send_resolved: true
    email_configs:
      - to: 'oncall@helen.example.com'
        send_resolved: true

  - name: 'chat'
    webhook_configs:
      - url: 'http://helen1:3000/api/admin/observability/alerts/ingest'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster', 'service']
