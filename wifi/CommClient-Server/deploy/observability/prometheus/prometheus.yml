global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: helen-prod

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # Helen-Server nodes (cluster)
  - job_name: helen-server
    metrics_path: /metrics
    static_configs:
      - targets:
          - "helen1:3000"
          - "helen2:3000"
          - "helen3:3000"
        labels:
          service: helen-server
          env: prod

  # Prometheus itself
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Alertmanager
  - job_name: alertmanager
    static_configs:
      - targets: ["alertmanager:9093"]

  # Loki
  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]

  # Tempo
  - job_name: tempo
    static_configs:
      - targets: ["tempo:3200"]
