groups:
  - name: helen-server-core
    interval: 30s
    rules:
      - alert: HelenServerDown
        expr: up{job="helen-server"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Helen node {{ $labels.instance }} down"
          description: "Prometheus has not been able to scrape the node for >1m."

      - alert: HelenHighErrorRate
        expr: |
          sum by (instance) (rate(helen_http_requests_total{status_class="5xx"}[5m]))
          /
          sum by (instance) (rate(helen_http_requests_total[5m]))
          > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: ">5% 5xx error rate on {{ $labels.instance }}"
          description: "Sustained for 5 minutes."

      - alert: HelenSlowRequests
        expr: histogram_quantile(0.95,
                sum by (le) (rate(helen_http_request_duration_seconds_bucket[5m]))) > 1.0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "p95 request latency >1s for 10m"

      - alert: HelenDBSlow
        expr: histogram_quantile(0.95,
                sum by (le) (rate(helen_db_query_duration_seconds_bucket[5m]))) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "p95 SQL query latency >500ms for 10m"

      - alert: HelenDLQGrowing
        expr: helen_dlq_size > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Dead-letter queue >100 for 10m"

      - alert: HelenBackupOverdue
        expr: time() - max(helen_backup_duration_seconds_created) > 86400
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "No backup recorded for over 24h"

      - alert: HelenWAFSpike
        expr: sum(rate(helen_waf_blocks_total[1m])) > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "WAF blocking >50 req/s for 5m"

      - alert: HelenClusterDegraded
        expr: helen_cluster_nodes{status="active"} < 2
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Fewer than 2 active cluster nodes"
