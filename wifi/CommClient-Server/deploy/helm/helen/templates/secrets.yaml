{{- if .Values.rendezvous.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "helen.rendezvous.fullname" . }}-token
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
  token: {{ default (randAlphaNum 48) .Values.rendezvous.env.HELEN_RENDEZVOUS_TOKEN | b64enc | quote }}
{{- end }}
