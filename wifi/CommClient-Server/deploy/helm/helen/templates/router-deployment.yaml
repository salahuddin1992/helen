{{- if .Values.router.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "helen.router.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "helen.labels" . | nindent 4 }}
    app.kubernetes.io/component: router
spec:
  replicas: {{ .Values.router.replicas }}
  strategy:
    {{- toYaml .Values.router.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "helen.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: router
  template:
    metadata:
      labels:
        {{- include "helen.labels" . | nindent 8 }}
        app.kubernetes.io/component: router
    spec:
      serviceAccountName: {{ include "helen.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      affinity:
        {{- if eq .Values.router.podAntiAffinity "hard" }}
        {{- include "helen.podAntiAffinity" (dict "mode" "hard" "labels" (dict "app.kubernetes.io/component" "router" "app.kubernetes.io/name" (include "helen.name" .))) | nindent 8 }}
        {{- end }}
      containers:
        - name: router
          image: {{ include "helen.image" (dict "registry" .Values.global.imageRegistry "repository" .Values.router.image.repository "tag" .Values.router.image.tag "Values" .Values) }}
          imagePullPolicy: {{ .Values.router.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            {{- range $key, $val := .Values.router.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.router.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.router.livenessProbe | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          {{- if .Values.router.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "helen.router.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "helen.router.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "helen.labels" . | nindent 4 }}
    app.kubernetes.io/component: router
spec:
  type: {{ .Values.router.service.type }}
  ports:
    - port: {{ .Values.router.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "helen.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: router
---
{{- if .Values.router.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "helen.router.fullname" . }}-data
  namespace: {{ .Release.Namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.router.persistence.size }}
  {{- include "helen.storageClass" (dict "storageClass" .Values.router.persistence.storageClass "Values" .Values) | nindent 2 }}
{{- end }}
{{- end }}
