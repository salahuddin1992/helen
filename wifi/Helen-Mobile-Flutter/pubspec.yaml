name: helen_mobile
description: Helen Mobile — Flutter-native client for the CommClient/Helen platform.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP & networking
  dio: ^5.7.0
  dio_smart_retry: ^6.0.0
  socket_io_client: ^2.0.3+1

  # Storage
  drift: ^2.20.2
  drift_flutter: ^0.2.1
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0
  flutter_secure_storage: ^9.2.2

  # Routing
  go_router: ^14.2.7

  # Data models / codegen
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Logging
  logger: ^2.4.0

  # Auth & security
  local_auth: ^2.3.0
  jwt_decoder: ^2.0.1

  # Push notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3

  # Camera / QR
  mobile_scanner: ^5.2.3
  image_picker: ^1.1.2

  # WebRTC / calls
  flutter_webrtc: ^0.11.7
  permission_handler: ^11.3.1

  # mDNS LAN discovery
  multicast_dns: ^0.3.2+7

  # Theming
  dynamic_color: ^1.7.0
  google_fonts: ^6.2.1

  # i18n
  intl: ^0.19.0

  # Utilities
  uuid: ^4.5.1
  collection: ^1.18.0
  rxdart: ^0.28.0
  crypto: ^3.0.5
  url_launcher: ^6.3.1
  share_plus: ^10.0.2
  package_info_plus: ^8.0.2
  device_info_plus: ^10.1.2
  connectivity_plus: ^6.0.5
  cached_network_image: ^3.4.1
  file_picker: ^8.1.2
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Lints
  flutter_lints: ^4.0.0

  # Codegen
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  drift_dev: ^2.20.2
  custom_lint: ^0.6.7
  riverpod_lint: ^2.3.13

  # Testing
  mocktail: ^1.0.4
  http_mock_adapter: ^0.6.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - .env
