name: tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend (pytest) — Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: |
            CommClient-Server/requirements.txt

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libssl-dev libffi-dev

      - name: Install Python deps
        working-directory: CommClient-Server
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run pytest with coverage
        working-directory: CommClient-Server
        env:
          HELEN_TEST_MODE: "1"
          HELEN_DISABLE_DISCOVERY: "1"
          HELEN_SECRET_KEY: "ci-test-key-0123456789abcdef0123456789abcdef"
        run: |
          python -m pytest \
            -c pytest.phase4.ini \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            -k "phase4 or health or auth or rbac or workspaces or agents or oauth or secrets_resolver or admin_logs or admin_metrics" \
            tests/

      - name: Upload coverage
        if: matrix.python == '3.12'
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          files: CommClient-Server/coverage.xml
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}

  # ──────────────────────────────────────────────────────────────────
  renderer-tests:
    name: Renderer + Main (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: CommClient-Desktop/package-lock.json

      - name: Install Node deps
        working-directory: CommClient-Desktop
        run: npm ci --no-audit --no-fund

      - name: Install vitest extras (if not in lockfile yet)
        working-directory: CommClient-Desktop
        run: |
          npm install --save-dev --no-audit --no-fund \
            @vitest/coverage-v8 || true

      - name: Run vitest with coverage
        working-directory: CommClient-Desktop
        run: |
          npx vitest run \
            --coverage \
            --reporter=default \
            --reporter=junit \
            --outputFile.junit=./vitest-report.xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          files: CommClient-Desktop/coverage/lcov.info
          flags: renderer
          token: ${{ secrets.CODECOV_TOKEN }}

  # ──────────────────────────────────────────────────────────────────
  e2e-windows:
    name: E2E (Playwright Electron) — Windows
    runs-on: windows-latest
    needs: [backend-tests, renderer-tests]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: CommClient-Server/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: CommClient-Desktop/package-lock.json

      - name: Install Python deps
        working-directory: CommClient-Server
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Node deps
        working-directory: CommClient-Desktop
        run: npm ci --no-audit --no-fund

      - name: Install Playwright
        working-directory: CommClient-Desktop
        run: |
          npm install --save-dev @playwright/test
          npx playwright install --with-deps chromium

      - name: Build renderer
        working-directory: CommClient-Desktop
        run: npm run build:renderer

      - name: Run Playwright suite
        working-directory: CommClient-Desktop
        run: npx playwright test --config e2e/playwright.config.ts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: CommClient-Desktop/playwright-report/
          retention-days: 7
