name: Android Builds

# Rebuilds Helen-Mobile Android artifacts on a free Linux runner so they
# stay reproducible from a clean clone — no Android Studio required.
#
# The keystore (android/keystore/helen-release.jks) and signing passwords
# are committed to the repo (LAN-only product, deliberate trade-off), so
# this workflow needs no secrets and produces signed artifacts on every run.
#
# Outputs (always):
#   • Helen-Mobile-1.0.0-debug.apk
#   • Helen-Mobile-1.0.0-release.apk
#   • Helen-Mobile-1.0.0.aab
#
# Override the committed keystore by setting `ANDROID_KEYSTORE_BASE64`
# secret; it will replace `android/keystore/helen-release.jks` before
# the gradle build runs.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android (APK + AAB)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: CommClient-Mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: CommClient-Mobile/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Install npm dependencies
        run: npm ci --no-audit --no-fund

      - name: Sync renderer + Capacitor android
        run: |
          node scripts/sync-renderer.mjs
          npx cap sync android

      - name: Override keystore (when secret is set)
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/keystore
          echo "$KS_B64" | base64 -d > android/keystore/helen-release.jks

      - name: Build debug + release + bundle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug assembleRelease bundleRelease --no-daemon

      - name: Stage artifacts
        run: |
          mkdir -p out
          cp android/app/build/outputs/apk/debug/app-debug.apk     out/Helen-Mobile-1.0.0-debug.apk
          cp android/app/build/outputs/apk/release/app-release.apk out/Helen-Mobile-1.0.0-release.apk
          cp android/app/build/outputs/bundle/release/app-release.aab out/Helen-Mobile-1.0.0.aab
          ls -la out/

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: CommClient-Mobile/out/*
          retention-days: 30

      - name: Attach to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: false
          files: CommClient-Mobile/out/*
