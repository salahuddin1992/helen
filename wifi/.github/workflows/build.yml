name: build-verification

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────
  pyinstaller-dry-run:
    name: PyInstaller dry-run
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: CommClient-Server/requirements.txt

      - name: Install Python deps + PyInstaller
        working-directory: CommClient-Server
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Smoke-build (no UPX, no Nuitka)
        working-directory: CommClient-Server
        run: |
          pyinstaller --noconfirm --clean --distpath dist-ci CommClient-Server.spec

      - name: Verify output exists
        working-directory: CommClient-Server
        shell: pwsh
        run: |
          if (-not (Test-Path "dist-ci\Helen-Server\Helen-Server.exe")) {
              throw "PyInstaller build did not produce Helen-Server.exe"
          }
          $sz = (Get-Item "dist-ci\Helen-Server\Helen-Server.exe").Length
          Write-Host "Helen-Server.exe size: $sz bytes"

  # ──────────────────────────────────────────────────────────────────
  electron-dry-run:
    name: electron-builder dry-run
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: CommClient-Desktop/package-lock.json

      - name: Install Node deps
        working-directory: CommClient-Desktop
        run: npm ci --no-audit --no-fund

      - name: Typecheck + lint
        working-directory: CommClient-Desktop
        run: |
          npm run typecheck
          npm run lint

      - name: Build renderer only (dry)
        working-directory: CommClient-Desktop
        run: npm run build:renderer

      - name: Electron-builder pack (unsigned, --dir)
        working-directory: CommClient-Desktop
        run: |
          npm run build:dir

      - name: Verify packaged output
        working-directory: CommClient-Desktop
        shell: pwsh
        run: |
          $unpacked = Get-ChildItem -Path "release" -Recurse -Filter "CommClient*.exe" -ErrorAction SilentlyContinue
          if (-not $unpacked) { throw "electron-builder produced no .exe" }
          $unpacked | Format-Table FullName, Length
