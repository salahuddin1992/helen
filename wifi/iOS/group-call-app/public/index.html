<!doctype html>
<!--
    Group call client — same `?room=<id>` across tabs joins one mesh
    call. Each participant sees themselves + every other participant.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Group call</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="stage">
    <header class="bar">
        <div class="title">
            <strong id="roomLabel">room</strong>
            <span class="meta">
                <span id="participantCount">0</span> in call
                · <span id="duration">00:00</span>
            </span>
        </div>
        <span id="status" class="pill">connecting…</span>
    </header>

    <main id="videoGrid" aria-label="Participants"></main>

    <footer class="controls" role="toolbar" aria-label="Call controls">
        <button class="ctrl" id="btnMute"   aria-label="Toggle microphone">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
                <path d="M19 10v1a7 7 0 0 1-14 0v-1"/>
                <line x1="12" y1="18" x2="12" y2="22"/>
                <line x1="8"  y1="22" x2="16" y2="22"/>
            </svg>
        </button>
        <button class="ctrl" id="btnCam"    aria-label="Toggle camera">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polygon points="23 7 16 12 23 17 23 7"/>
                <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
            </svg>
        </button>
        <button class="ctrl is-end" id="btnEnd" aria-label="End call">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07
                         19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3
                         a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11
                         L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45
                         12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
        </button>
    </footer>
</div>

<!-- Socket.IO is served by the same Express process at /socket.io/ -->
<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>

</body>
</html>
