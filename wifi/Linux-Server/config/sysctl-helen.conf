# Helen-Server kernel tuning. Drop into /etc/sysctl.d/.
# Apply:  sudo cp config/sysctl-helen.conf /etc/sysctl.d/99-helen.conf
#         sudo sysctl --system
#
# Rationale for each tunable is inline. Don't copy blindly — some values
# (connection tracking) only matter on boxes doing NAT/firewall work.

# ── UDP buffers — SFU & Relay benefit hugely ───────────────────────
# Default rmem_max is 212k on most distros. Media bursts overrun this
# and cause "RX dropped" in ip -s link. 4MB is a conservative raise.
net.core.rmem_max = 4194304
net.core.wmem_max = 4194304
net.core.rmem_default = 524288
net.core.wmem_default = 524288

# UDP-specific bump
net.ipv4.udp_mem = 65536 131072 262144

# ── Receive queue ──────────────────────────────────────────────────
# Short bursts of Socket.IO connects + media allocations outrun default
# netdev_max_backlog of 1000.
net.core.netdev_max_backlog = 5000

# ── TCP — HTTP + WS accept queue ───────────────────────────────────
# uvicorn's backlog arg caps at net.core.somaxconn; raising both lets
# a burst of 1000 concurrent reconnects land cleanly.
net.core.somaxconn = 8192
net.ipv4.tcp_max_syn_backlog = 8192

# Keepalive — detect dead clients faster
net.ipv4.tcp_keepalive_time = 60
net.ipv4.tcp_keepalive_intvl = 10
net.ipv4.tcp_keepalive_probes = 3

# Reuse TIME_WAIT sockets to avoid port exhaustion under churn
net.ipv4.tcp_tw_reuse = 1

# ── File descriptors (process-level also set in systemd unit) ──────
fs.file-max = 262144

# ── IPv6 (disable only if your LAN is IPv4-only and you want to
#        silence the autoconf noise). Leave alone otherwise. ─────
# net.ipv6.conf.all.disable_ipv6 = 1

# ── Connection tracking (matters if iptables/nftables has stateful rules
#        or when running behind a NAT firewall — harmless if conntrack
#        module isn't loaded)
net.netfilter.nf_conntrack_max = 262144

# ── Swap — media servers should NOT swap ───────────────────────────
vm.swappiness = 10
