# Helen-Rendezvous — nginx LB for the docker-compose cluster topology.
#
# Three rendezvous backends, IP-hash for WS stickiness, least_conn for HTTP.
# WebSocket upgrade is forwarded as-is. Health probes at /health.

worker_processes auto;
events { worker_connections 4096; }

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream rendezvous_http {
        least_conn;
        server rendezvous-1:8080 max_fails=2 fail_timeout=5s;
        server rendezvous-2:8080 max_fails=2 fail_timeout=5s;
        server rendezvous-3:8080 max_fails=2 fail_timeout=5s;
        keepalive 64;
    }

    # WS — pin a Helen-Server to one backend by source IP so its long-lived
    # /tunnel/register WS doesn't ping-pong on reconnect.
    upstream rendezvous_ws {
        ip_hash;
        server rendezvous-1:8080;
        server rendezvous-2:8080;
        server rendezvous-3:8080;
    }

    server {
        listen 8080;
        server_name _;

        # /tunnel/register and /t/<id>/<path> may upgrade to WS — let nginx
        # detect the Upgrade header and route accordingly.
        location / {
            proxy_pass http://rendezvous_http;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout  300s;
            proxy_send_timeout  300s;
        }

        location /tunnel/ {
            proxy_pass http://rendezvous_ws;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout  1d;
            proxy_send_timeout  1d;
        }

        location = /health {
            proxy_pass http://rendezvous_http/health;
        }
    }

    # Raw TCP relay ports (:9101/:9102) are passed through at L4.
    # Nginx stream module variant — uncomment if you want one nginx for both.
}

stream {
    upstream relay_backend_pool {
        server rendezvous-1:9101;
        server rendezvous-2:9101;
        server rendezvous-3:9101;
    }
    upstream relay_frontend_pool {
        server rendezvous-1:9102;
        server rendezvous-2:9102;
        server rendezvous-3:9102;
    }

    server {
        listen 9101;
        proxy_pass relay_backend_pool;
        proxy_timeout 300s;
    }
    server {
        listen 9102;
        proxy_pass relay_frontend_pool;
        proxy_timeout 300s;
    }
}
