# ============================================================
# Helen coturn config — pair with helen-server's turn_service.py
# ============================================================
# The static-auth-secret here MUST match the secret helen-server uses
# to mint credentials in /api/turn/ice-config — both sides compute
# HMAC-SHA1(secret, username) and that's what authenticates clients.
# Rotate via env var on both sides simultaneously.

# Listening
listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0

# Relay range — large enough for thousands of concurrent allocations.
# Open this UDP range on host firewall.
min-port=49152
max-port=65535

# Realm — must match HELEN_TURN_REALM in helen-server. Default 'commclient.local'.
realm=commclient.local

# Auth: time-limited HMAC. The "username" coturn sees is
# `<expiry-unix>:<user_id>`; the password is HMAC-SHA1(static-auth-secret, username).
# helen-server.turn_service.generate_credentials() produces both.
use-auth-secret
static-auth-secret=REPLACE_WITH_LONG_RANDOM_SECRET

# Lock down to known-safe relay networks. Without this an open coturn
# can be abused as a NAT-pinhole for arbitrary Internet hosts.
no-multicast-peers
no-loopback-peers
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255         # tighten if you trust this LAN
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.0.2.0-192.0.2.255
denied-peer-ip=192.88.99.0-192.88.99.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=198.18.0.0-198.19.255.255
denied-peer-ip=198.51.100.0-198.51.100.255
denied-peer-ip=203.0.113.0-203.0.113.255
denied-peer-ip=240.0.0.0-255.255.255.255
# Add allowed ranges (or leave default — clients will use srflx-from-server-side)

# Quotas — protect against abuse
total-quota=2000      # max allocations system-wide
user-quota=10         # max per user
max-bps=2000000       # 2Mbps cap per allocation

# TLS (5349). Provide a cert via volume mount; use Let's Encrypt + auto-renew.
# cert=/etc/coturn/cert.pem
# pkey=/etc/coturn/privkey.pem

# Logging
log-file=/var/log/coturn/turnserver.log
verbose
fingerprint
no-cli                # disable CLI port (5766)
no-tlsv1
no-tlsv1_1            # only TLS 1.2+

# Operational
pidfile=/var/run/turnserver.pid
proc-user=nobody
proc-group=nogroup
