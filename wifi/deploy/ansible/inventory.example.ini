# Helen Ansible inventory — example.
#
# Copy to inventory.ini, edit hostnames/IPs to match your LAN.
# Run from the controller (your laptop):
#   ansible-playbook -i inventory.ini site.yml

[helen_servers]
helen-srv-01  ansible_host=10.0.0.10  ansible_user=admin
# helen-srv-02  ansible_host=10.0.1.10  ansible_user=admin   # uncomment for multi-host

[helen_rendezvous]
# Enable if you have a multi-LAN deployment.
# helen-rdv     ansible_host=10.0.0.11  ansible_user=admin

[helen_clients_linux]
desktop-01    ansible_host=10.0.0.20  ansible_user=alice
desktop-02    ansible_host=10.0.0.21  ansible_user=bob

[helen_clients_windows]
# Windows targets need WinRM/SSH set up. Add `ansible_connection=ssh`
# (with OpenSSH on Windows) or use winrm.
# winpc-01    ansible_host=10.0.0.30  ansible_user=admin  ansible_connection=winrm

[all:vars]
# Path on the controller where built artefacts live
helen_artefacts_dir=/home/admin/helen-release/

# Default install paths on targets
helen_server_install=/opt/helen-server
helen_rendezvous_install=/opt/helen-rendezvous

# Service identity
helen_user=helen
helen_group=helen
