# nginx — Helen internal update server.
# Drop into /etc/nginx/sites-available/, symlink to sites-enabled/, reload.

server {
    listen 80;
    listen [::]:80;
    server_name updates.lan.local helen-updates;

    root /var/lib/helen-updates;
    autoindex off;
    server_tokens off;

    # Restrict to RFC1918 — same posture as the rest of Helen.
    allow 127.0.0.1;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    allow 169.254.0.0/16;
    deny all;

    # Manifest — small, frequently fetched, cheap to send fresh
    location = /manifest.json {
        types { } default_type application/json;
        add_header Cache-Control "no-cache, must-revalidate";
        try_files /manifest.json =404;
    }

    # Release artefacts — large, immutable once published
    location ~ ^/(server|rendezvous|desktop|mobile|admin)/[\w.-]+/ {
        types {
            application/gzip            tar.gz tgz;
            application/x-msdownload    exe;
            application/octet-stream    apk aab;
            application/x-debian-package deb;
            application/x-pem-file      pem;
            text/plain                  sha256;
        }
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log /var/log/nginx/helen-updates-access.log;

        # Force download (don't render in browser)
        if ($request_uri ~ "\.(exe|apk|aab|tar\.gz|deb)$") {
            add_header Content-Disposition 'attachment';
        }

        try_files $uri =404;
    }

    # Health check for monitoring
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Block everything else
    location / {
        return 404;
    }

    # Logs
    error_log  /var/log/nginx/helen-updates-error.log warn;
    access_log /var/log/nginx/helen-updates-access.log;
}
